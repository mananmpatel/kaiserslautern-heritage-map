<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaiserslautern Heritage Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Interactive Industrial Heritage and Urban History Map of Kaiserslautern</h1>
  
      <p class="intro">
        Explore former industrial sites, workers' settlements, cultural landmarks, historical areas, and a suggested walking route through Kaiserslautern.
      </p>
  
      <section>
        <h2>POI Filters</h2>
  
        <label>
          <input type="checkbox" class="category-filter" value="former_industrial_site" checked>
          <span class="category-swatch category-former-industrial-site"></span>
          Former industrial sites
        </label>
  
        <label>
          <input type="checkbox" class="category-filter" value="workers_settlement" checked>
          <span class="category-swatch category-workers-settlement"></span>
          Workers' settlements
        </label>
  
        <label>
          <input type="checkbox" class="category-filter" value="cultural_site" checked>
          <span class="category-swatch category-cultural-site"></span>
          Cultural sites
        </label>
  
        <label>
          <input type="checkbox" class="category-filter" value="historical_landmark" checked>
          <span class="category-swatch category-historical-landmark"></span>
          Historical landmarks
        </label>
  
        <label>
          <input type="checkbox" class="category-filter" value="urban_development_site" checked>
          <span class="category-swatch category-urban-development-site"></span>
          Urban development sites
        </label>
  
        <label>
          <input type="checkbox" class="category-filter" value="public_space" checked>
          <span class="category-swatch category-public-space"></span>
          Public spaces
        </label>
      </section>

      <section>
        <h2>Historical Map</h2>

        <label class="opacity-control" for="historical-opacity">
          <span>1893 map opacity</span>
          <input type="range" id="historical-opacity" min="0" max="1" step="0.05" value="0.55">
        </label>
      </section>
    </aside>
  
    <main id="map"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
